<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mai</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      padding: 16px 24px;
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 { font-size: 18px; font-weight: 600; }

    #company-input {
      margin-left: auto;
      padding: 6px 12px;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      font-size: 14px;
      width: 160px;
      outline: none;
    }

    #company-input:focus { border-color: #999; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 680px;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 15px;
      line-height: 1.5;
    }

    .message.user {
      background: #1a1a1a;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .message.assistant {
      background: #fff;
      color: #1a1a1a;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      border: 1px solid #e5e5e5;
      position: relative;
    }

    .message.assistant .sql {
      margin-top: 8px;
      padding: 8px 10px;
      background: #f5f5f5;
      border-radius: 6px;
      font-family: monospace;
      font-size: 13px;
      color: #555;
    }

    .message.error { background: #fff0f0; color: #c00; border: 1px solid #fcc; align-self: flex-start; }
    .message.thinking { color: #999; background: #fff; border: 1px solid #e5e5e5; align-self: flex-start; font-style: italic; }

    /* Rating */
    .rating {
      display: none;
      margin-top: 10px;
      gap: 4px;
      flex-wrap: wrap;
    }

    .message.assistant:hover .rating { display: flex; }

    .rating button {
      width: 28px;
      height: 28px;
      border: 1px solid #e5e5e5;
      border-radius: 6px;
      background: #fff;
      font-size: 12px;
      cursor: pointer;
      color: #555;
      transition: background 0.1s;
    }

    .rating button:hover { background: #f0f0f0; }
    .rating button.selected { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }

    #input-area {
      padding: 16px 24px;
      background: #fff;
      border-top: 1px solid #e5e5e5;
      display: flex;
      gap: 10px;
    }

    #question-input {
      flex: 1;
      padding: 10px 16px;
      border: 1px solid #e5e5e5;
      border-radius: 24px;
      font-size: 15px;
      outline: none;
    }

    #question-input:focus { border-color: #999; }

    #send-btn {
      padding: 10px 20px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 24px;
      font-size: 15px;
      cursor: pointer;
    }

    #send-btn:disabled { background: #ccc; cursor: default; }
    #send-btn:hover:not(:disabled) { background: #333; }
  </style>
</head>
<body>

<header>
  <h1>mai</h1>
  <input id="company-input" type="text" placeholder="Company ID" value="Amadeo" />
</header>

<div id="messages"></div>

<div id="input-area">
  <input id="question-input" type="text" placeholder="Ask a question..." />
  <button id="send-btn">Send</button>
</div>

<script>
  const API = "https://mai-production-cff7.up.railway.app";
  const messages = document.getElementById("messages");
  const questionInput = document.getElementById("question-input");
  const companyInput = document.getElementById("company-input");
  const sendBtn = document.getElementById("send-btn");

  const history = [];

  function addMessage(role, content, sql = null) {
    const div = document.createElement("div");
    div.className = `message ${role}`;
    div.textContent = content;
    if (sql) {
      const sqlDiv = document.createElement("div");
      sqlDiv.className = "sql";
      sqlDiv.textContent = sql;
      div.appendChild(sqlDiv);
    }
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return div;
  }

  function addRating(div, logId) {
    const rating = document.createElement("div");
    rating.className = "rating";

    for (let i = 1; i <= 10; i++) {
      const btn = document.createElement("button");
      btn.textContent = i;
      btn.onclick = async () => {
        // Highlight selected
        rating.querySelectorAll("button").forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");

        await fetch(`${API}/log/${logId}`, {
          method: "PATCH",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ rating: i })
        });
      };
      rating.appendChild(btn);
    }

    div.appendChild(rating);
  }

  async function sendLog(company, question, answer) {
    try {
      const res = await fetch(`${API}/log`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ company_id: company, question, answer })
      });
      const data = await res.json();
      return data.log_id;
    } catch {
      return null;
    }
  }

  async function ask() {
    const question = questionInput.value.trim();
    const company = companyInput.value.trim();
    if (!question || !company) return;

    addMessage("user", question);
    questionInput.value = "";
    sendBtn.disabled = true;

    const thinking = addMessage("thinking", "Thinking…");

    try {
      const res = await fetch(`${API}/query`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ company_id: company, question, history: history.slice(-10) })
      });
      const data = await res.json();
      thinking.remove();

      if (!res.ok) {
        addMessage("error", data.detail || "Something went wrong.");
      } else {
        const msgDiv = addMessage("assistant", data.answer, data.sql);
        history.push({ role: "user", content: question });
        history.push({ role: "assistant", content: data.answer });

        // Log and attach rating UI
        const logId = await sendLog(company, question, data.answer);
        if (logId) addRating(msgDiv, logId);
      }
    } catch (e) {
      thinking.remove();
      addMessage("error", "Could not reach the server.");
    }

    sendBtn.disabled = false;
    questionInput.focus();
  }

  sendBtn.addEventListener("click", ask);
  questionInput.addEventListener("keydown", e => { if (e.key === "Enter") ask(); });
</script>

</body>
</html>
